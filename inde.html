<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💙</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        text-align: center;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 300px;
    }

    h1 {
        color: #ff4d6d;
        font-size: 22px;
    }

    button {
        margin-top: 20px;
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background-color: #ff4d6d;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #e63950;
    }

    #mensaje {
        display: none;
        margin-top: 20px;
        font-size: 18px;
        color: #333;
    }

    .corazon {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: flotar 3s linear infinite;
    }

    @keyframes flotar {
        0% {
            transform: translateY(0);
            opacity: 1;
        }
        100% {
            transform: translateY(-800px);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>
        💖 Eres el mejor novio del mundo 💖<br><br>
        Mi niño hermoso, espero que tengas dulces sueños mi fofo 💕<br><br>
        Te amo ❤️
    </h1>

    <button onclick="mostrarAmor()">Haz clic aquí 💘</button>

    <div id="mensaje">
        💕 Siempre contigo, eres mi lugar favorito 💕
    </div>
</div>

<script>
function mostrarAmor() {
    document.getElementById("mensaje").style.display = "block";

    // Generar corazones animados
    for (let i = 0; i < 20; i++) {
        let corazon = document.createElement("div");
        corazon.className = "corazon";
        corazon.innerHTML = "❤️";

        corazon.style.left = Math.random() * 100 + "vw";
        corazon.style.fontSize = (Math.random() * 20 + 10) + "px";
        corazon.style.animationDuration = (Math.random() * 2 + 2) + "s";

        document.body.appendChild(corazon);

        setTimeout(() => {
            corazon.remove();
        }, 3000);
    }
}
</script>

</body>
</html>
